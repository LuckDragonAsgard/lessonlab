<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LessonLab — Private beta</title>
<meta name="description" content="LessonLab is in private beta. Public launch coming soon.">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="googlebot" content="noindex,nofollow,noarchive">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:    #08112b;
    --navy2:   #0f1e42;
    --blue:    #3b6ef8;
    --blue-l:  #6b93fa;
    --text:    #ffffff;
    --muted:   rgba(255,255,255,0.62);
    --border:  rgba(255,255,255,0.1);
  }
  html, body { min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--navy);
    background-image:
      radial-gradient(ellipse 900px 600px at 70% 30%, rgba(59,110,248,0.14) 0%, transparent 70%),
      radial-gradient(ellipse 700px 500px at 20% 80%, rgba(107,147,250,0.08) 0%, transparent 70%);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .frame {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }
  .card {
    width: 100%;
    max-width: 520px;
    text-align: center;
  }
  .mark {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #3b6ef8 0%, #6b93fa 100%);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 12px 28px rgba(59,110,248,0.35);
  }
  .mark svg { width: 30px; height: 30px; }
  h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.8px;
    margin-bottom: 14px;
  }
  .pill {
    display: inline-block;
    background: rgba(59,110,248,0.18);
    color: var(--blue-l);
    border: 1px solid rgba(59,110,248,0.35);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 28px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  p.lead {
    color: var(--muted);
    font-size: 17px;
    max-width: 440px;
    margin: 0 auto 32px;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 10px;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(59,110,248,0.4);
    transition: background .15s, transform .1s;
  }
  .cta:hover { background: #2a5ae8; transform: translateY(-1px); }
  .link {
    color: var(--muted);
    font-size: 14px;
    text-decoration: none;
    margin-top: 6px;
  }
  .link:hover { color: #fff; }
  .meta {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 24px 28px;
    border-top: 1px solid var(--border);
  }
  .meta strong { color: rgba(255,255,255,0.78); font-weight: 600; }
  @media (max-width: 480px) {
    h1 { font-size: 28px; }
    p.lead { font-size: 15px; }
  }
</style>
</head>
<body>
  <main class="frame">
    <div class="card">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h10"></path>
        </svg>
      </div>
      <span class="pill">Private beta</span>
      <h1>LessonLab</h1>
      <p class="lead">AI lesson planning for Victorian teachers. We're tightening the bolts before opening doors more widely &mdash; thanks for your patience.</p>
      <div class="actions">
        <a class="cta" href="mailto:hello@lessonlab.com.au?subject=LessonLab%20early%20access">Request early access</a>
        <a class="link" href="/app">Already invited? Sign in &rarr;</a>
      </div>
    </div>
  </main>
  <div class="meta">
    Luck Dragon Pty Ltd &middot; Melbourne, Australia &middot; <strong>hello@lessonlab.com.au</strong>
  </div>
</body>
</html>
